name: issue-driven-flow

# Issue に `flow` ラベルを付けると shape（要件整形）→ 人間の承認 → build（実装 PR）が回る。
# photo-layout と同じ 4moda/issue-driven-flow の再利用ワークフロー構成。
# 必要な Secrets:
#   CLAUDE_CODE_OAUTH_TOKEN … Claude Code の OAuth トークン（必須）
#   GF_BOT_TOKEN            … workflow スコープ付き PAT（.github/workflows/ 配下の変更と
#                             PR からの CI 起動に必要。未設定時は GITHUB_TOKEN にフォールバック）
on:
  issues:
    types: [labeled, closed]
  pull_request:
    types: [labeled, closed, reopened]
  pull_request_review:
    types: [submitted]

jobs:
  shape:
    if: github.event_name == 'issues' && github.event.label.name == 'flow'
    uses: 4moda/issue-driven-flow/.github/workflows/shape.yml@v2
    permissions:
      contents: read
      issues: write
    with:
      model: claude-sonnet-5
      max_turns: 50
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  build:
    # fires for `flow` on an issue AND for `flow` on a flow/issue-N pull request
    if: github.event.label.name == 'flow'
    uses: 4moda/issue-driven-flow/.github/workflows/build.yml@v2
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      model: claude-sonnet-5
      max_turns: 150
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      bot_token: ${{ secrets.GF_BOT_TOKEN }}

  sync-pr:
    if: >-
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'pull_request' && github.event.action != 'labeled') ||
      (github.event_name == 'issues' && github.event.action == 'closed')
    uses: 4moda/issue-driven-flow/.github/workflows/sync-pr.yml@v2
    permissions:
      issues: write
      pull-requests: read
