name: screenshots-preview-cleanup

# PRがクローズ（マージ含む）されたら、そのPRのCloudflare Pagesスクショプレビュー
# （branch=pr-<PR番号>のデプロイ）を削除する。デプロイ側は ci.yml の
# screenshots-index ジョブ（#31, #32）。
on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  deployments: write

concurrency:
  group: screenshots-preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Delete Cloudflare Pages preview
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Cloudflareアカウント・Pagesプロジェクト・Zero Trust Accessポリシーは人間が事前に
      # 用意する前提（CIでは完結しない）。Secrets未設定の間は静かにスキップする
      # （ci.yml側でデプロイ自体も行っていないため、削除する対象がそもそも無い）。
      - name: Check Cloudflare secrets
        id: cf_check
        env:
          CF_TOKEN_SET: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
          CF_ACCOUNT_SET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          if [ "$CF_TOKEN_SET" = "true" ] && [ "$CF_ACCOUNT_SET" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID が未設定のため、プレビュー削除をスキップします。"
          fi

      # branch=pr-<番号> に紐づく全デプロイを列挙して削除する。
      # Cloudflare Pages API はbranchでの絞り込みクエリを提供しないため、
      # 一覧をページングしつつ deployment_trigger.metadata.branch で自前フィルタする。
      #
      # 収集（全ページ走査）と削除を分離すること: ページ走査中にDELETEすると、
      # Cloudflare側の残存一覧では削除された要素の後続が前方に繰り上がる。その
      # 状態で次のpageを要求すると、本来そのpageの先頭にあった要素が読み飛ばされ、
      # 一度も一覧に現れず削除されないまま残ってしまう（#41）。
      - name: Delete preview deployments for this PR
        if: steps.cf_check.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: photosheet-screenshots
          BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          base="https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments"

          # 1. 収集フェーズ: 削除を一切行わずに全ページを走査し、一致するidを集める。
          page=1
          ids=""
          while :; do
            response=$(curl -sS -f -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$base?page=$page&per_page=25")
            page_ids=$(echo "$response" | jq -r --arg branch "$BRANCH" \
              '.result[] | select(.deployment_trigger.metadata.branch == $branch) | .id')
            ids="$ids"$'\n'"$page_ids"
            total_pages=$(echo "$response" | jq -r '.result_info.total_pages // 1')
            if [ "$page" -ge "$total_pages" ]; then
              break
            fi
            page=$((page + 1))
          done

          # 2. 削除フェーズ: 収集し終えたidに対してのみDELETEする。
          deleted=0
          for id in $ids; do
            echo "Deleting deployment $id (branch=$BRANCH)"
            curl -sS -f -X DELETE -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "$base/$id?force=true" >/dev/null
            deleted=$((deleted + 1))
          done
          echo "Deleted $deleted deployment(s) for branch $BRANCH."

      # cloudflare/pages-action（ci.yml側）にgitHubTokenを渡しているため、Cloudflareの
      # デプロイとは別に、GitHub純正のDeploymentsオブジェクト（PRタイムラインの小さな行、
      # repos/.../deployments）もpushのたびに作られる。これは上のCloudflare REST API削除
      # では一切消えないため、GitHub Deployments APIで独立して片付ける。
      #
      # GitHub Deployments APIは ?ref=<branch> のサーバー側フィルタに対応しているが、
      # 削除で一覧件数が変わる以上ページング中の削除は同種の読み飛ばしを起こしうるため、
      # 上のCloudflare側と同じく収集→削除の二段階にする。GitHubの制約で、statusが
      # inactive/error/failureのいずれかでないとdeploymentを削除できないため、削除前に
      # inactiveステータスを作成する。
      - name: Delete GitHub Deployments for this PR
        if: steps.cf_check.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          # 1. 収集フェーズ: 削除を一切行わずに全ページを走査し、idを集める。
          page=1
          ids=""
          while :; do
            response=$(gh api "repos/$REPO/deployments?ref=$REF&per_page=100&page=$page")
            page_ids=$(echo "$response" | jq -r '.[].id')
            ids="$ids"$'\n'"$page_ids"
            count=$(echo "$response" | jq 'length')
            if [ "$count" -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done

          # 2. 削除フェーズ: 収集し終えたidに対してのみinactive化→DELETEする。
          deleted=0
          for id in $ids; do
            echo "Deactivating and deleting GitHub deployment $id (ref=$REF)"
            gh api -X POST "repos/$REPO/deployments/$id/statuses" -f state=inactive >/dev/null
            gh api -X DELETE "repos/$REPO/deployments/$id" >/dev/null
            deleted=$((deleted + 1))
          done
          echo "Deleted $deleted GitHub deployment(s) for ref $REF."
