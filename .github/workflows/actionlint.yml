name: actionlint

# ワークフロー定義を actionlint（＋ shellcheck）で静的検査する。
# ワークフローを変更したときだけ走る軽量ジョブ（photo-layout と同じ構成）。
on:
  pull_request:
    paths: ['.github/workflows/**']
  push:
    branches: [main]
    paths: ['.github/workflows/**']

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # 公式リリースのバイナリを固定バージョンで取得（curl|bash を避ける）。
      # ubuntu ランナーには shellcheck が同梱され、run スクリプトも検査される。
      - name: Install actionlint (pinned release binary)
        env:
          ACTIONLINT_VERSION: 1.7.9
        run: |
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint

      - name: Run actionlint
        run: ./actionlint -color
