name: Device Build (unsigned IPA)

# 実機確認用の未署名 IPA を生成する。
# ダウンロードした IPA を Sideloadly / AltStore で無料 Apple ID 署名して実機にインストールする。
# CI が main で成功した後にだけ走る（テストが赤いビルドを配布しない・分数節約）。手動実行も可能。
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: device-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 40
    # 手動実行、または CI が成功したときのみ実行（失敗/キャンセル時はスキップ）
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      # workflow_run 起動時は既定でデフォルトブランチ HEAD を取るため、
      # CI が回した実際のコミットを明示的にチェックアウトする。
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS device (unsigned)
        run: |
          xcodebuild build \
            -project PhotoSheet.xcodeproj \
            -scheme PhotoSheet \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R "DerivedData/Build/Products/Release-iphoneos/PhotoSheet.app" Payload/
          zip -qry "PhotoSheet-unsigned-${{ github.run_number }}.ipa" Payload
          ls -lh *.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSheet-unsigned-ipa
          path: "*.ipa"
          retention-days: 14
