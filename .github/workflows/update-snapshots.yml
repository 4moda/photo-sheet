name: Update Snapshots

# スナップショットの参照画像を CI で再生成し、実行対象ブランチへ直接コミット・push する手動ワークフロー。
# 実行手順:
#   1. GitHub Actions > Update Snapshots > Run workflow（対象ブランチを選択）
#   2. 完了後、参照画像の変更は自動でコミット・push 済み（差分がなければ何もしない）
#   3. artifact `snapshot-images` は監査・確認用に引き続きアップロードされる

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    name: Record Snapshots
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' in runtime:
                  for d in devices:
                      if d.get('name') == 'iPhone 17' and d.get('isAvailable'):
                          candidates.append((runtime, d['udid']))
          if candidates:
              print(sorted(candidates)[-1][1])
          else:
              sys.exit(1)
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $UDID"

      - name: Record snapshots
        # TEST_RUNNER_RECORD_SNAPSHOTS は「環境変数」として渡す必要がある。
        # xcodebuild は TEST_RUNNER_ プレフィックス付きの環境変数だけを、
        # プレフィックスを外してテストランナーへ伝播する（→ テスト側 RECORD_SNAPSHOTS=true）。
        # ビルド設定引数として渡すと伝播されず record モードが起動しない（旧バグ）。
        env:
          TEST_RUNNER_RECORD_SNAPSHOTS: "true"
        run: |
          xcodebuild test \
            -project PhotoSheet.xcodeproj \
            -scheme PhotoSheet \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing PhotoSheetSnapshotTests \
            CODE_SIGNING_ALLOWED=NO \
          || true  # record モードは必ず失敗するため終了コードを無視する

      - name: Upload recorded snapshots
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-images
          path: PhotoSheetSnapshotTests/__Snapshots__/

      - name: Commit and push updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PhotoSheetSnapshotTests/__Snapshots__/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore: スナップショット参照画像を自動更新 (run ${{ github.run_id }})"
          git push origin HEAD:${{ github.ref_name }}
