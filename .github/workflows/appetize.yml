name: Appetize Deploy

# シミュレータ向けビルドを Appetize.io にアップロードし、ブラウザで動作確認できるようにする。
# 必要な Secrets:
#   APPETIZE_API_TOKEN  … Appetize のアカウントページで発行した API トークン（必須）
#   APPETIZE_PUBLIC_KEY … 初回アップロードで発行される publicKey（設定すると同じ URL を更新し続ける）
# 「テスト → デプロイ」の順序を保証する: main への push で CI が成功した後にだけ走る。
# テストが赤いビルドを Appetize に上げないためのゲート。手動実行も可能。
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: appetize-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & upload to Appetize
    runs-on: macos-15
    timeout-minutes: 40
    # 手動実行、または CI が成功したときのみ実行（失敗/キャンセル時はスキップ）
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      # workflow_run 起動時は既定でデフォルトブランチ HEAD を取るため、
      # CI が回した実際のコミットを明示的にチェックアウトする。
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Check secret
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
        run: |
          if [ -z "$APPETIZE_API_TOKEN" ]; then
            echo "::error::APPETIZE_API_TOKEN secret が未設定です。Appetize.io で API トークンを発行し、リポジトリの Secrets に登録してください。"
            exit 1
          fi

      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project PhotoSheet.xcodeproj \
            -scheme PhotoSheet \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip .app bundle
        run: |
          cd DerivedData/Build/Products/Release-iphonesimulator
          zip -qry "$GITHUB_WORKSPACE/PhotoSheet-simulator.zip" PhotoSheet.app

      - name: Upload to Appetize
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY }}
        run: |
          if [ -n "$APPETIZE_PUBLIC_KEY" ]; then
            URL="https://api.appetize.io/v1/apps/$APPETIZE_PUBLIC_KEY"
          else
            URL="https://api.appetize.io/v1/apps"
          fi
          RESPONSE=$(curl -sS -f -u "$APPETIZE_API_TOKEN:" "$URL" \
            -F "file=@PhotoSheet-simulator.zip" \
            -F "platform=ios")
          PUBLIC_KEY=$(echo "$RESPONSE" | jq -r '.publicKey')
          {
            echo "## Appetize デプロイ完了 🎉"
            echo ""
            echo "- Appetize へのアップロードが完了しました。"
            echo "- URL / publicKey は Appetize 管理画面または Secret から確認してください。"
            if [ -z "$APPETIZE_PUBLIC_KEY" ]; then
              echo ""
              echo "> 次回以降も同じ URL を使うには、初回発行された publicKey を Secret \`APPETIZE_PUBLIC_KEY\` に登録してください。"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
