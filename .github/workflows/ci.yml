name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  # コア層 (Domain + 永続化) の高速テスト。ubuntu は課金倍率 1x で macOS (10x) より安い。
  core-tests:
    name: Core Tests (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Run core tests
        run: swift test

  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Select simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' in runtime:
                  for d in devices:
                      if d.get('name') == 'iPhone 16' and d.get('isAvailable'):
                          candidates.append((runtime, d['udid']))
          if candidates:
              print(sorted(candidates)[-1][1])
          else:
              sys.exit(1)
          ")
          echo "udid=$UDID" >> $GITHUB_OUTPUT
          echo "Selected simulator: $UDID"
      - name: Build and test
        run: |
          xcodebuild test \
            -project PhotoSheet.xcodeproj \
            -scheme PhotoSheet \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Upload snapshot reference images (for first-time recording)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-images
          path: PhotoSheetSnapshotTests/__Snapshots__/
          if-no-files-found: ignore
      - name: Coverage gate (Domain >= 80%)
        run: bash scripts/coverage-gate.sh TestResults.xcresult 80
