name: CI

# ドキュメントのみの変更では CI を回さない（macOS ランナーは課金倍率 10x）。
# Appetize Deploy / Device Build は本ワークフローの成功を workflow_run で待つ
# ゲート構成のため、docs のみの push では macOS ジョブが一切走らない。
on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.claude/**']
  pull_request:
    paths-ignore: ['**/*.md', 'docs/**', '.claude/**']

# 最小権限（コードの読み取りのみ。artifact アップロードはランタイムトークンで動作する）
permissions:
  contents: read

# 連続 push 時は古い run をキャンセルして分数を節約する
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  # コア層 (Domain + 永続化) の高速テスト。ubuntu は課金倍率 1x で macOS (10x) より安い。
  core-tests:
    name: Core Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Run core tests
        run: swift test

  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Select simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' in runtime:
                  for d in devices:
                      if d.get('name') == 'iPhone 16' and d.get('isAvailable'):
                          candidates.append((runtime, d['udid']))
          if candidates:
              print(sorted(candidates)[-1][1])
          else:
              sys.exit(1)
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $UDID"
      # コンパイルエラーを最短で検知するため、テスト実行とは分けて先にビルドする
      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project PhotoSheet.xcodeproj \
            -scheme PhotoSheet \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO
      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -project PhotoSheet.xcodeproj \
            -scheme PhotoSheet \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Upload snapshot reference images (for first-time recording)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-images
          path: PhotoSheetSnapshotTests/__Snapshots__/
          if-no-files-found: ignore
      - name: Coverage gate (Domain >= 80%)
        run: bash scripts/coverage-gate.sh TestResults.xcresult 80
