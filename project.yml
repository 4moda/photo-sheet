name: PhotoSheet
options:
  bundleIdPrefix: dev.fourmoda
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
targets:
  PhotoSheet:
    type: application
    platform: iOS
    sources:
      - PhotoSheet
    dependencies:
      - package: ZIPFoundation
    info:
      path: PhotoSheet/Resources/Info.plist
      properties:
        CFBundleDisplayName: Photo Sheet
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: 完成したシートをカメラロールに保存するために使用します。
        LSApplicationQueriesSchemes:
          - instagram-stories
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fourmoda.photosheet
        TARGETED_DEVICE_FAMILY: "1"
  PhotoSheetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PhotoSheetTests
    dependencies:
      - target: PhotoSheet
  PhotoSheetSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PhotoSheetSnapshotTests
    dependencies:
      - target: PhotoSheet
      - package: SnapshotTesting
schemes:
  PhotoSheet:
    build:
      targets:
        PhotoSheet: all
    test:
      targets:
        - PhotoSheetTests
        - PhotoSheetSnapshotTests
