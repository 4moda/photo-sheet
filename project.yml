name: PhotoSheet
options:
  bundleIdPrefix: dev.fourmoda
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
targets:
  PhotoSheet:
    type: application
    platform: iOS
    sources:
      - PhotoSheet
    dependencies:
      - package: ZIPFoundation
    info:
      path: PhotoSheet/Resources/Info.plist
      properties:
        CFBundleDisplayName: Photo Sheet
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: 完成したシートをカメラロールに保存するために使用します。
        LSApplicationQueriesSchemes:
          - instagram-stories
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fourmoda.photosheet
        TARGETED_DEVICE_FAMILY: "1"
        # AppIcon.appiconset を追加したので xcodegen の既定値 "AppIcon" をそのまま使う
        # (以前は Assets.xcassets に AppIcon が無く actool が落ちるため空文字で無効化していた)。
        # AccentColor.colorset をアプリ全体の tint として実際に使うには明示指定が必要
        # （AppIcon と違い xcodegen は自動で設定しない。指定しないと Color.accentColor が
        # 常に system blue のままになる）。
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  PhotoSheetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PhotoSheetTests
    dependencies:
      - target: PhotoSheet
  PhotoSheetSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PhotoSheetSnapshotTests
    dependencies:
      - target: PhotoSheet
      - package: SnapshotTesting
  # スクショ撮影用 UI テスト（fastlane snapshot が駆動する）。
  # fastlane/tools はビルド対象外（Xcode ターゲットには .swift のみ含める）。
  PhotoSheetUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PhotoSheetUITests
        includes:
          - "*.swift"
    dependencies:
      - target: PhotoSheet
schemes:
  PhotoSheet:
    build:
      targets:
        PhotoSheet: all
    test:
      targets:
        - PhotoSheetTests
        - PhotoSheetSnapshotTests
        - PhotoSheetUITests
